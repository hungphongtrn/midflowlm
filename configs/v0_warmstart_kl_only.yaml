experiment_name: "v0_warmstart_kl_only"

seed: 1337

# Teacher State Mode: online_no_cache is now the default (disk-space friendly)
teacher_state:
  mode: online_no_cache

# Teacher Cache: Disabled by default. Set enabled: true only if needed.
teacher_cache:
  enabled: false
  cache_dir: "./cache/warmstart_qwen_boundary_states"
  store_logits: true
  store_hidden_states: true
  overwrite: false

model:
  name: "Qwen/Qwen3.5-0.8B"
  revision: null
  max_steps_T: 8
  train_T_values: [4]
  train_T_weights: [1.0]
  step_embedding: "discrete"
  reuse_qwen_modules: true

replacement_model:
  family: "minfm-hidden-refiner"
  source_repo: "external/minFM"
  source_commit: "2b15c5ffa9f6a083650994e385ee11ca23ee7ab7"
  start_layer: 8
  end_layer: 11
  architecture_mode: "causal_hidden_refiner"
  depth: 4
  mlp_ratio: 4.0
  qkv_bias: true
  use_qwen_causal_mask: true
  use_step_conditioning: true
  conditioning_mode: "timestep_plus_layer_boundary"
  init_strategy: "fresh"

data:
  loader: "mixture"
  seq_len: 1024
  batch_size: 1
  num_workers: 2
  pin_memory: true
  persistent_workers: false
  shuffle_seed: 1337
  mixture_components:
    - name: "fineweb_edu"
      dataset_name: "HuggingFaceFW/fineweb-edu"
      dataset_config: "sample-10BT"
      train_split: "train"
      val_split: "train"
      format_type: "plain_text"
      text_field: "text"
      train_samples: 12000
      val_samples: 600
    - name: "ultrachat_sft"
      dataset_name: "HuggingFaceH4/ultrachat_200k"
      dataset_config: "default"
      train_split: "train_sft"
      val_split: "test_sft"
      format_type: "chat_messages"
      messages_field: "messages"
      train_samples: 5000
      val_samples: 250
    - name: "arc_challenge"
      dataset_name: "allenai/ai2_arc"
      dataset_config: "ARC-Challenge"
      train_split: "train"
      val_split: "validation"
      format_type: "mcq_choices"
      use_chat_template: true
      question_field: "question"
      choices_field: "choices"
      answer_field: "answerKey"
      train_samples: 900
      val_samples: 120
    - name: "arc_easy"
      dataset_name: "allenai/ai2_arc"
      dataset_config: "ARC-Easy"
      train_split: "train"
      val_split: "validation"
      format_type: "mcq_choices"
      use_chat_template: true
      question_field: "question"
      choices_field: "choices"
      answer_field: "answerKey"
      train_samples: 1200
      val_samples: 150
    - name: "commonsense_qa"
      dataset_name: "tau/commonsense_qa"
      dataset_config: "default"
      train_split: "train"
      val_split: "validation"
      format_type: "mcq_choices"
      use_chat_template: true
      question_field: "question"
      choices_field: "choices"
      answer_field: "answerKey"
      train_samples: 1500
      val_samples: 150
    - name: "openbookqa"
      dataset_name: "allenai/openbookqa"
      dataset_config: "main"
      train_split: "train"
      val_split: "validation"
      format_type: "mcq_choices"
      use_chat_template: true
      question_field: "question_stem"
      choices_field: "choices"
      answer_field: "answerKey"
      train_samples: 900
      val_samples: 100

loss:
  velocity_weight: 1.0
  endpoint_weight: 0.0
  trajectory_weight: 0.0
  kl_weight: 0.25
  teacher_logits_source: "online"
  ce_weight: 0.0
  mask_padding_tokens: true

optimizer:
  name: "adamw"
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8
  grad_clip_norm: 1.0

scheduler:
  name: "cosine_with_warmup"
  warmup_steps: 100

train_loop:
  precision: "bf16-mixed"
  max_epochs: 1
  accumulate_grad_batches: 16
  sample_continuous_time: true
  log_every_n_steps: 10
  val_check_interval: 250
  gradient_checkpointing: true
  checkpoint_dir: "./outputs/v0_warmstart_kl_only/checkpoints"
  init_from_checkpoint: "./outputs/v0_online_no_cache_mixed_ce_kl/checkpoints/best.ckpt"

logging:
  log_dir: "./outputs/v0_warmstart_kl_only/logs"
  save_top_k: 2
  monitor: "val/total_loss"
  mode: "min"

tensorboard:
  enabled: true
  log_dir: "./outputs/v0_warmstart_kl_only/tensorboard"
  log_every_n_steps: 10
