experiment_name: "v0_online_no_cache_1024_kl"

seed: 1337

model:
  name: "Qwen/Qwen3.5-0.8B"
  revision: null
  max_steps_T: 8
  train_T_values: [4]
  train_T_weights: [1.0]
  step_embedding: "discrete"
  reuse_qwen_modules: true

replacement_model:
  family: "minfm-hidden-refiner"
  source_repo: "external/minFM"
  source_commit: "2b15c5ffa9f6a083650994e385ee11ca23ee7ab7"
  start_layer: 8
  end_layer: 11
  architecture_mode: "causal_hidden_refiner"
  depth: 4
  mlp_ratio: 4.0
  qkv_bias: true
  use_qwen_causal_mask: true
  use_step_conditioning: true
  conditioning_mode: "timestep_plus_layer_boundary"
  init_strategy: "fresh"

data:
  dataset_name: "roneneldan/TinyStories"
  dataset_revision: null
  text_field: "text"
  seq_len: 1024
  train_samples: 1000
  val_samples: 100
  batch_size: 1
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  shuffle_seed: 1337

loss:
  velocity_weight: 1.0
  endpoint_weight: 0.0
  trajectory_weight: 0.0
  kl_weight: 0.25
  teacher_logits_source: "online"
  ce_weight: 0.0
  mask_padding_tokens: true

optimizer:
  name: "adamw"
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8
  grad_clip_norm: 1.0

scheduler:
  name: "cosine_with_warmup"
  warmup_steps: 50

train_loop:
  precision: "bf16-mixed"
  max_epochs: 3
  accumulate_grad_batches: 1
  sample_continuous_time: true
  log_every_n_steps: 10
  val_check_interval: 100
  gradient_checkpointing: false
  checkpoint_dir: "./outputs/v0_online_no_cache_1024_kl/checkpoints"
  resume_from_checkpoint: null

logging:
  log_dir: "./outputs/v0_online_no_cache_1024_kl/logs"
  save_top_k: 1
  monitor: "val/total_loss"
  mode: "min"
