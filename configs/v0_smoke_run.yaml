experiment_name: "v0_qwen_iterative_midblock_smoke"
seed: 1337

# Teacher State Mode: online_no_cache is now the default (disk-space friendly)
teacher_state:
  mode: online_no_cache

# Teacher Cache: Disabled by default. Set enabled: true only if needed.
teacher_cache:
  enabled: false
  cache_dir: "./cache/tinystories_qwen_boundary_states_smoke"
  store_logits: false
  store_hidden_states: true
  overwrite: true

data:
  dataset_name: "roneneldan/TinyStories"
  dataset_revision: null
  text_field: "text"
  seq_len: 128
  train_samples: 8
  val_samples: 2
  test_samples: 2
  batch_size: 1
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  shuffle_seed: 1337

loss:
  velocity_weight: 1.0
  endpoint_weight: 0.0
  trajectory_weight: 0.0
  kl_weight: 0.25
  teacher_logits_source: "online"
  ce_weight: 0.0
  mask_padding_tokens: true

optimizer:
  name: "adamw"
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8
  grad_clip_norm: 1.0

scheduler:
  name: "cosine_with_warmup"
  warmup_steps: 10

train_loop:
  precision: "fp32"
  max_epochs: 1
  accumulate_grad_batches: 1
  sample_continuous_time: true
  log_every_n_steps: 1
  val_check_interval: 1
  gradient_checkpointing: false
  checkpoint_dir: "./outputs/v0_qwen_iterative_midblock_smoke/checkpoints"
  resume_from_checkpoint: null

logging:
  log_dir: "./outputs/v0_qwen_iterative_midblock_smoke/logs"
  save_top_k: 1
  monitor: "val/total_loss"
  mode: "min"
