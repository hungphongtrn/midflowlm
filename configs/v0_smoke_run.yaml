experiment_name: "v0_qwen_iterative_midblock_smoke"
seed: 1337

model:
  name: "Qwen/Qwen3.5-0.8B"
  revision: null
  max_steps_T: 8
  train_T_values: [1, 2, 4]
  train_T_weights: [0.4, 0.4, 0.2]
  step_embedding: "discrete"
  reuse_qwen_modules: true

replacement_model:
  family: "minfm-hidden-refiner"
  source_repo: "external/minFM"
  source_commit: "2b15c5ffa9f6a083650994e385ee11ca23ee7ab7"
  start_layer: 8
  end_layer: 11
  architecture_mode: "causal_hidden_refiner"
  depth: 4
  mlp_ratio: 4.0
  qkv_bias: true
  use_qwen_causal_mask: true
  use_step_conditioning: true
  conditioning_mode: "timestep_plus_layer_boundary"
  init_strategy: "fresh"
  trajectory_alignment:
    T_less_than_depth:
      policy: "compression"
      method: "uniform_sampling"
    T_equals_depth:
      policy: "exact"
      method: "one_to_one_mapping"
    T_greater_than_depth:
      policy: "expansion"
      method: "linear_interpolation"

teacher_cache:
  enabled: true
  cache_dir: "./cache/tinystories_qwen_boundary_states_smoke"
  store_logits: true
  store_hidden_states: true
  overwrite: true

data:
  dataset_name: "roneneldan/TinyStories"
  dataset_revision: null
  text_field: "text"
  seq_len: 128
  train_samples: 8
  val_samples: 2
  test_samples: 2
  batch_size: 1
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  shuffle_seed: 1337

loss:
  endpoint_weight: 1.0
  trajectory_weight: 1.0
  kl_weight: 0.25
  ce_weight: 0.0
  mask_padding_tokens: true

optimizer:
  name: "adamw"
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8
  grad_clip_norm: 1.0

scheduler:
  name: "cosine_with_warmup"
  warmup_steps: 10

train_loop:
  precision: "fp32"
  max_epochs: 1
  accumulate_grad_batches: 1
  log_every_n_steps: 1
  val_check_interval: 1
  gradient_checkpointing: false
  checkpoint_dir: "./outputs/v0_qwen_iterative_midblock_smoke/checkpoints"
  resume_from_checkpoint: null

logging:
  log_dir: "./outputs/v0_qwen_iterative_midblock_smoke/logs"
  save_top_k: 1
  monitor: "val/total_loss"
  mode: "min"
