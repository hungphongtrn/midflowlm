experiment_name: "v0_qwen_iterative_midblock"
seed: 1337

model:
  name: "Qwen/Qwen3.5-0.8B"
  revision: null
  max_steps_T: 8
  time_domain: [0.0, 1.0]
  time_embedding: "sinusoidal"
  ode_solver:
    method: "euler"
    atol: 1.0e-5
    rtol: 1.0e-5
  reuse_qwen_modules: true

replacement_model:
  family: "minfm-hidden-refiner"
  source_repo: "external/minFM"
  source_commit: "2b15c5ffa9f6a083650994e385ee11ca23ee7ab7"
  start_layer: 8
  end_layer: 11
  architecture_mode: "causal_hidden_refiner"
  depth: 4
  mlp_ratio: 4.0
  qkv_bias: true
  use_qwen_causal_mask: true
  predict_velocity: true
  use_step_conditioning: false
  use_time_conditioning: true
  conditioning_mode: "timestep_plus_layer_boundary"
  init_strategy: "fresh"
  trajectory_alignment:
    # Policies for different T regimes relative to span depth
    T_less_than_depth:
      policy: "compression"
      description: "Compress teacher trajectory to match student steps"
      method: "uniform_sampling"  # Options: uniform_sampling, weighted_sampling
    T_equals_depth:
      policy: "exact"
      description: "Exact layerwise trajectory matching"
      method: "one_to_one_mapping"
    T_greater_than_depth:
      policy: "expansion"
      description: "Expand/interpolate teacher trajectory (approximate)"
      method: "linear_interpolation"
      note: "Results are approximate when T exceeds teacher depth"

teacher_cache:
  enabled: true
  cache_dir: "./cache/tinystories_qwen_boundary_states"
  store_logits: false
  store_hidden_states: true
  overwrite: false
  val_split_ratio: 0.05

data:
  dataset_name: "roneneldan/TinyStories"
  dataset_revision: null
  text_field: "text"
  seq_len: 128
  train_samples: 20000
  val_samples: 1000
  test_samples: 1000
  batch_size: 8
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  shuffle_seed: 1337

loss:
  endpoint_weight: 1.0
  trajectory_weight: 1.0
  kl_weight: 0.0
  ce_weight: 0.0
  mask_padding_tokens: true

optimizer:
  name: "adamw"
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8
  grad_clip_norm: 1.0

scheduler:
  name: "cosine_with_warmup"
  warmup_steps: 100

train_loop:
  precision: "bf16-mixed"
  max_epochs: 3
  accumulate_grad_batches: 4
  log_every_n_steps: 10
  val_check_interval: 250
  gradient_checkpointing: false
  sample_continuous_time: true
  checkpoint_dir: "./outputs/v0_qwen_iterative_midblock/checkpoints"
  resume_from_checkpoint: null

logging:
  log_dir: "./outputs/v0_qwen_iterative_midblock/logs"
  save_top_k: 2
  monitor: "val/total_loss"
  mode: "min"

# Operational Documentation
# =========================
# This section documents operational assumptions for running v0 experiments.
#
## Minimum Hardware Requirements
# - GPU: 1x GPU with at least 16GB VRAM (tested on 24GB)
# - RAM: 32GB system memory recommended
# - Storage: ~10GB for teacher cache + model checkpoints
#
## Teacher Cache Information
# - Cache location: ./cache/tinystories_qwen_boundary_states/
# - Cache size: ~2-3GB for 20k training samples at seq_len=128
# - Cache includes: h_start, velocity_target, h_target, teacher_logits
# - Must be built BEFORE training: python scripts/build_teacher_cache.py --config configs/v0_onemotif.yaml
#
## Checkpoint Naming Scheme
# - Format: checkpoint_epoch_{N}_step_{M}_loss_{loss:.4f}.pt
# - Location: ./outputs/v0_qwen_iterative_midblock/checkpoints/
# - Best checkpoints saved according to save_top_k and monitor settings
#
## Resume Training
# - Use: python scripts/train_v0.py --config configs/v0_onemotif.yaml --resume-from-checkpoint <path>
#
## Smoke Test Runtime
# - Teacher cache (8 samples): ~30 seconds
# - Training fast-dev-run: ~2-3 minutes
# - Training 2 batches: ~3-5 minutes
# - Evaluation (8 samples): ~30 seconds
#
## Expected Workflow
# 1. Build teacher cache: python scripts/build_teacher_cache.py --config configs/v0_onemotif.yaml
# 2. Print model stats: python scripts/print_model_stats.py --config configs/v0_onemotif.yaml
# 3. Run training: python scripts/train_v0.py --config configs/v0_onemotif.yaml
# 4. Run evaluation: python scripts/eval_v0.py --config configs/v0_onemotif.yaml
#
## Go/No-Go Criteria
# Before scaling up, verify:
# - Teacher cache is deterministic and complete
# - Parity tests pass (pytest tests/test_qwen_parity.py -v)
# - Training smoke tests pass (pytest tests/test_train_smoke.py -v)
# - Iterative block beats identity baseline
