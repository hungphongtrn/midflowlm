# Test if KL + Trajectory fits on 3060 12GB with seq_len=32
# If this works, we'll update all smoke tests to use full losses

experiment_name: "test_kl_traj_3060"
seed: 1337

teacher_state:
  mode: online_no_cache

teacher_cache:
  enabled: false
  store_logits: true
  store_hidden_states: true

model:
  name: "Qwen/Qwen3.5-0.8B"
  max_steps_T: 8
  train_T_values: [2, 4]
  train_T_weights: [0.5, 0.5]
  step_embedding: "discrete"
  reuse_qwen_modules: true

replacement_model:
  family: "flow_midblock"
  start_layer: 8
  end_layer: 11
  depth: 4
  mlp_ratio: 4.0
  qkv_bias: true
  use_qwen_causal_mask: true
  use_step_conditioning: true
  conditioning_mode: "timestep_plus_layer_boundary"
  init_strategy: "fresh"

data:
  loader: "mixture"
  seq_len: 32  # Short context
  batch_size: 1
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  shuffle_seed: 1337
  mixture_components:
    - name: "fineweb_edu_tiny"
      dataset_name: "HuggingFaceFW/fineweb-edu"
      dataset_config: "sample-10BT"
      train_split: "train"
      val_split: "train"
      format_type: "plain_text"
      text_field: "text"
      train_samples: 10
      val_samples: 5

loss:
  velocity_weight: 0.0
  endpoint_weight: 1.0
  trajectory_weight: 1.0  # ENABLED
  kl_weight: 0.5  # ENABLED
  teacher_logits_source: "online"
  ce_weight: 0.0
  mask_padding_tokens: true

optimizer:
  name: "adamw"
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8
  grad_clip_norm: 1.0

scheduler:
  name: "cosine_with_warmup"
  warmup_steps: 5

train_loop:
  precision: "bf16-mixed"
  max_epochs: 1
  accumulate_grad_batches: 4
  sample_continuous_time: true
  log_every_n_steps: 5
  val_check_interval: 10
  gradient_checkpointing: true
  checkpoint_dir: "./outputs/test_kl_traj/checkpoints"

logging:
  log_dir: "./outputs/test_kl_traj/logs"
  save_top_k: 1
  monitor: "val/total_loss"
  mode: "min"

tensorboard:
  enabled: false

wandb:
  enabled: false
