# Smoke test config for 3060 - MINIMAL
# Uses seq_len=32 for fast testing
# Tests: batch_size=1, endpoint-only loss (no KL/Traj to save memory)
# ~2-3 minutes to complete

experiment_name: "v0_1_smoke_minimal_3060"
seed: 1337

teacher_state:
  mode: online_no_cache

teacher_cache:
  enabled: false
  cache_dir: "./cache/smoke_minimal_3060"
  store_logits: false
  store_hidden_states: false
  overwrite: false

model:
  name: "Qwen/Qwen3.5-0.8B"
  revision: null
  max_steps_T: 8
  train_T_values: [2, 4]
  train_T_weights: [0.5, 0.5]
  step_embedding: "discrete"
  reuse_qwen_modules: true

replacement_model:
  family: "flow_midblock"
  start_layer: 8
  end_layer: 11
  depth: 4
  mlp_ratio: 4.0
  qkv_bias: true
  use_qwen_causal_mask: true
  use_step_conditioning: true
  conditioning_mode: "timestep_plus_layer_boundary"
  init_strategy: "fresh"

data:
  loader: "mixture"
  seq_len: 32  # VERY SHORT for smoke test
  batch_size: 1
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  shuffle_seed: 1337
  mixture_components:
    - name: "fineweb_edu_tiny"
      dataset_name: "HuggingFaceFW/fineweb-edu"
      dataset_config: "sample-10BT"
      train_split: "train"
      val_split: "train"
      format_type: "plain_text"
      text_field: "text"
      train_samples: 20  # Very small
      val_samples: 5

loss:
  velocity_weight: 0.0
  endpoint_weight: 1.0
  trajectory_weight: 0.0
  kl_weight: 0.0  # Disabled - saves memory
  teacher_logits_source: "online"
  ce_weight: 0.0
  mask_padding_tokens: true

optimizer:
  name: "adamw"
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8
  grad_clip_norm: 1.0

scheduler:
  name: "cosine_with_warmup"
  warmup_steps: 5

train_loop:
  precision: "bf16-mixed"
  max_epochs: 1
  accumulate_grad_batches: 4  # Reduced for speed
  sample_continuous_time: true
  log_every_n_steps: 5
  val_check_interval: 10
  gradient_checkpointing: true
  checkpoint_dir: "./outputs/smoke_minimal_3060/checkpoints"

logging:
  log_dir: "./outputs/smoke_minimal_3060/logs"
  save_top_k: 1
  monitor: "val/total_loss"
  mode: "min"

tensorboard:
  enabled: false

wandb:
  enabled: false  # Disabled for speed, enable if you want to see it
  project: "midflowlm-smoke"
  entity: null
  tags: ["smoke-test", "minimal", "3060"]
